random_seed: 42
base_url: "http://localhost:11434"

models:
  - "deepseek-coder:1.3b"
  - "codegemma:2b"

temperatures: [0.0, 0.3, 0.7]
top_p: [0.5, 0.7, 0.9]
top_k: [10, 40, 100]
repetitions: 3

max_tokens: 220
timeout_seconds: 120

dataset_path: "datasets/slm_tasks_ptbr.jsonl"
output_path: "results/raw_benchmark.jsonl"

judges:
  - type: "heuristic"
  - type: "ollama_judge"
    model: "gemma2:2b"
